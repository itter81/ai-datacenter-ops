# =========================================================
# 8. GPU 服务器 iDRAC（Dell XE9680，8 卡 H200）
# =========================================================
# 说明：
#   - 采集对象为 iDRAC 带外管理口，SNMP v2
#   - X 台服务器，iDRAC IP 段：<idrac-mgmt-subnet>
#   - OID 为 Dell 专用 MIB（IDRAC-MIB-SMIv2），采集 GPU 温度
#   - iDRAC 默认 community 为 public，生产环境建议修改
# =========================================================
[[inputs.snmp]]
  agents = [
    # X 台 Dell XE9680 iDRAC 管理 IP
    # 地址段：<idrac-mgmt-subnet>
    "<idrac-ip-1>",
    "<idrac-ip-2>"
    # ...
  ]
  version = 2
  community = "public"
  [inputs.snmp.tags]
    device_role = "GPU-Server-XE9680"

  # GPU 温度 OID（Dell XE9680 专用，共 8 张卡）
  # OID 路径：IDRAC-MIB-SMIv2::temperatureProbeReading
  [[inputs.snmp.field]]
    name = "gpu_temp_1"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.4"
  [[inputs.snmp.field]]
    name = "gpu_temp_2"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.5"
  [[inputs.snmp.field]]
    name = "gpu_temp_3"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.6"
  [[inputs.snmp.field]]
    name = "gpu_temp_4"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.7"
  [[inputs.snmp.field]]
    name = "gpu_temp_5"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.8"
  [[inputs.snmp.field]]
    name = "gpu_temp_6"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.9"
  [[inputs.snmp.field]]
    name = "gpu_temp_7"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.10"
  [[inputs.snmp.field]]
    name = "gpu_temp_8"
    oid = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.11"


# =========================================================
# 处理器：温度值还原
# =========================================================
# Dell iDRAC SNMP 返回的温度值为实际值 × 10
# 例如：返回 260 → 实际 26.0°C
# 需要 scale × 0.1 还原
# =========================================================
[[processors.scale]]
  [[processors.scale.scaling]]
    fields = [
      "gpu_temp_1", "gpu_temp_2", "gpu_temp_3", "gpu_temp_4",
      "gpu_temp_5", "gpu_temp_6", "gpu_temp_7", "gpu_temp_8"
    ]
    factor = 0.1
