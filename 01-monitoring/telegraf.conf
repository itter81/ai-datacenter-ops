
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  omit_hostname = true
  hostname = "<your-hostname>"

[[outputs.http]]
  url = "http://127.0.0.1:8428/api/v1/import/prometheus"
  data_format = "prometheus"

# ---------------------------------------------------------
# 1. 存储交换机
# ---------------------------------------------------------
[[inputs.snmp]]
  agents = [
    # 存储交换机管理 IP，按实际填写
    # 示例：X 台，地址段 <storage-sw-mgmt-subnet>
    "<storage-sw-ip-1>",
    "<storage-sw-ip-2>"
    # ...
  ]
  version = 2
  community = "<your-snmp-community>"
  [inputs.snmp.tags]
    device_role = "storage_sw"

  [[inputs.snmp.table]]
    name = "interface_traffic"
    inherit_tags = ["hostname"]
    [[inputs.snmp.table.field]]
      name = "ifName"
      oid = ".1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = ".1.3.6.1.2.1.31.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = ".1.3.6.1.2.1.31.1.1.1.10"
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = ".1.3.6.1.2.1.2.2.1.14"
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = ".1.3.6.1.2.1.2.2.1.20"


